version: "2"

run:
  timeout: 5m
  go: "1.24.2"

linters:
  enable:
    - govet # Examines Go source code and reports suspicious constructs
    - staticcheck # Go static analysis, applying a ton of rules
    - errcheck # Ensures that errors are handled
    - gocyclo # Computes and checks the cyclomatic complexity of functions
    - revive # Fast, configurable, extensible, flexible linter for Go
    - bodyclose # Checks whether HTTP response bodies are closed
    - gosec # Inspects source code for security problems
    - unused # Checks for unused constants, variables, functions and types
    - nilnil # Checks that there is no simultaneous return of nil error and an invalid value
  exclusions:
    paths:
      - "vendor/.*"
      - "node_modules/.*"
      - ".*_generated\\.go"
      - ".*_test\\.go"
    rules:
      # Don't check test files with certain linters
      - path: "_test\\.go"
        linters:
          - gosec
          - errcheck
  settings:
    exhaustruct:
      exclude:
        - ".*_test\\.go"
        - "^testing\\.T$"
    errcheck:
      check-type-assertions: true
      check-blank: true
    staticcheck:
      checks: ["all", "-SA1019"]
    gocyclo:
      min-complexity: 20
    revive:
      rules:
        - name: var-naming
          severity: warning
        - name: empty-block
          severity: error
        - name: unused-parameter
          severity: warning
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - commentFormatting

formatters:
  enable:
    - gofmt
    - goimports

issues:
  # Limit the number of issues per linter
  max-issues-per-linter: 50
  max-same-issues: 10

output:
  formats:
    text:
      path: stdout
      colors: true
  sort-order:
    - linter
    - file
