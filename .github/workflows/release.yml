name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  build-release-artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: scalable-ecommerce-platform-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: scalable-ecommerce-platform-linux-arm64
          - goos: darwin
            goarch: amd64
            artifact: scalable-ecommerce-platform-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact: scalable-ecommerce-platform-darwin-arm64
          - goos: windows
            goarch: amd64
            artifact: scalable-ecommerce-platform-windows-amd64.exe
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -ldflags="-s -w \
              -X main.Version=${{ github.ref_name }} \
              -X main.BuildTime=$(date -u '+%Y-%m-%dT%H:%M:%SZ') \
              -X main.CommitHash=${{ github.sha }}" \
            -o ./bin/${{ matrix.artifact }} \
            ./cmd/scalable-ecommerce-platform

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ./bin/${{ matrix.artifact }}
          retention-days: 1

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-release-artifacts
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd ./release-artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            ./release-artifacts/*
